name: Build Craft Agents Server Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile.server
      - package.json
      - bun.lock
      - bunfig.toml
      - packages/**
      - apps/**
      - scripts/**
      - patches/dockerfile-server-oss.patch
      - .github/workflows/build-server-ghcr.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/craft-agents-server

jobs:
  build:
    name: Build and push linux/arm64 image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply OSS Dockerfile patch
        shell: bash
        run: |
          git apply --check patches/dockerfile-server-oss.patch
          git apply patches/dockerfile-server-oss.patch

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-ossfix
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
